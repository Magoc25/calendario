name: Supabase Keep-Alive

on:
  schedule:
    # Roda todo dia às 08:00 UTC (05:00 horário de Brasília)
    - cron: '0 8 * * *'
  workflow_dispatch: # permite rodar manualmente se necessário

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase reviews
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            "${{ secrets.REV_SB_URL }}/rest/v1/app_reviews?select=id&limit=1" \
            -H "apikey: ${{ secrets.REV_SB_KEY }}" \
            -H "Authorization: Bearer ${{ secrets.REV_SB_KEY }}")
          echo "Status HTTP: $STATUS"
          if [ "$STATUS" != "200" ]; then
            echo "Aviso: resposta inesperada do Supabase ($STATUS)"
            exit 1
          fi
          echo "Supabase reviews ativo."
